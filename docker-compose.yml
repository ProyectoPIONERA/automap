services:
  rml-agent:
    build:
      context: .
      network: host
    container_name: LLM-Agent_RML
    network_mode: "host"
    env_file:
      - .env
    volumes:
      - ./data:/app/data          # persist input/output data
      - ./.env:/app/.env:ro       # mount .env read-only
    # Override the default run here, e.g.:
    # command: ["--shacl", "--sparql"]
